<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clientiment | Feedback</title>
  <style>
    :root {
      --blue: #0f4fb3;
      --blue-dark: #10346b;
      --teal: #35d0c7;
      --text: #1f2a37;
      --muted: #6b7280;
      --border: #dbe5ef;
      --success: #10b981;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, rgba(16, 52, 107, 0.97), rgba(53, 208, 199, 0.88)), #10346b;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .wrap { width: 100%; max-width: 520px; }
    .card {
      background: rgba(255, 255, 255, 0.97);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 24px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.14);
      padding: 28px 20px 22px;
    }
    .brand { text-align: center; margin-bottom: 18px; }
    .brand h1 {
      margin: 0;
      color: var(--blue-dark);
      font-size: 28px;
      letter-spacing: 0.4px;
    }
    .brand p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    .biz-label {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    .section-title {
      margin: 20px 0 10px;
      font-size: 15px;
      font-weight: 700;
      color: var(--blue-dark);
    }
    .question {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      color: var(--blue-dark);
      margin: 8px 0 16px;
    }
    .stars {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .star-btn {
      border: 2px solid var(--border);
      background: #fff;
      border-radius: 16px;
      width: 56px;
      height: 56px;
      font-size: 26px;
      cursor: pointer;
      transition: 0.18s ease;
    }
    .star-btn:hover, .star-btn.active {
      border-color: var(--teal);
      background: #ecfffd;
      transform: translateY(-1px);
    }
    .rating-note {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      min-height: 18px;
      margin-bottom: 14px;
    }
    .chip-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .chip {
      border: 1.5px solid var(--border);
      background: #fff;
      border-radius: 14px;
      padding: 13px 12px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--blue-dark);
      cursor: pointer;
      transition: 0.18s ease;
      user-select: none;
    }
    .chip.selected {
      border-color: var(--teal);
      background: #eafffc;
    }
    textarea, input[type="text"] {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      outline: none;
      transition: 0.18s ease;
      background: #fff;
      color: var(--text);
    }
    textarea {
      resize: vertical;
      min-height: 95px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0 10px;
      font-size: 14px;
      color: var(--blue-dark);
      font-weight: 600;
    }
    .submit-btn {
      width: 100%;
      border: none;
      background: var(--blue);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border-radius: 16px;
      padding: 15px 18px;
      cursor: pointer;
      margin-top: 18px;
    }
    .submit-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .hidden { display: none; }
    .message {
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.45;
    }
    .error {
      background: #fff1f2;
      color: #991b1b;
      border: 1px solid #fecdd3;
    }
    .success {
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
      text-align: center;
    }
    .debug-banner {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      z-index: 99999;
      padding: 10px 12px;
      font-size: 12px;
      color: white;
      word-break: break-word;
    }
    .debug-error { background: #b91c1c; }
    .debug-promise { background: #7f1d1d; }
    .footer-note {
      text-align: center;
      color: rgba(255,255,255,0.85);
      margin-top: 12px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">
        <h1>Clientiment</h1>
        <p>Client Sentiment Intelligence</p>
        <div class="biz-label" id="bizLabel"></div>
      </div>

      <div class="question">How was your experience?</div>

      <div class="stars" id="stars">
        <button class="star-btn" type="button" data-rating="1">★</button>
        <button class="star-btn" type="button" data-rating="2">★</button>
        <button class="star-btn" type="button" data-rating="3">★</button>
        <button class="star-btn" type="button" data-rating="4">★</button>
        <button class="star-btn" type="button" data-rating="5">★</button>
      </div>

      <div class="rating-note" id="ratingNote">Tap a rating to continue</div>

      <form id="feedbackForm">
        <div id="issueSection" class="hidden">
          <div class="section-title" id="issueTitle">What went wrong?</div>
          <div class="chip-grid" id="chipGrid"></div>
        </div>

        <div class="section-title">Comment (optional)</div>
        <textarea id="comment" maxlength="500" placeholder="Tell us more if you want..."></textarea>

        <label class="toggle-row">
          <input type="checkbox" id="contactToggle" />
          I would like to be contacted
        </label>

        <div id="contactSection" class="hidden">
          <input type="text" id="contact" maxlength="120" placeholder="Phone or email" />
        </div>

        <button class="submit-btn" type="submit" id="submitBtn" disabled>
          Submit Feedback
        </button>

        <div id="formMessage"></div>
      </form>
    </div>

    <div class="footer-note">Powered by Clientiment</div>
  </div>

  <script>
    function appendDebugBanner(message, className) {
      const el = document.createElement("div");
      el.className = `debug-banner ${className}`;
      el.textContent = message;
      document.body.appendChild(el);
    }

    window.onerror = function (msg, url, line, col) {
      appendDebugBanner(`ERROR: ${msg} (line ${line}, col ${col})`, "debug-error");
    };

    window.onunhandledrejection = function (event) {
      const reason = event && event.reason ? String(event.reason) : "Unknown promise rejection";
      appendDebugBanner(`PROMISE ERROR: ${reason}`, "debug-promise");
    };
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyADlG3ogY7IdDqZ6fF4wTunqOhD8-lJUag",
      authDomain: "clientiment.firebaseapp.com",
      projectId: "clientiment",
      storageBucket: "clientiment.firebasestorage.app",
      messagingSenderId: "317722818403",
      appId: "1:317722818403:web:0fd8f223a677b539008556"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const businessId = (urlParams.get("b") || "default-business").trim();
    const businessName = (urlParams.get("name") || businessId).trim();

    document.getElementById("bizLabel").textContent = `Business: ${businessName}`;

    const negativeOptions = ["Service", "Waiting Time", "Staff", "Price", "Other"];
    const positiveOptions = ["Service", "Speed", "Staff", "Quality", "Cleanliness"];

    const stars = document.querySelectorAll(".star-btn");
    const ratingNote = document.getElementById("ratingNote");
    const issueSection = document.getElementById("issueSection");
    const issueTitle = document.getElementById("issueTitle");
    const chipGrid = document.getElementById("chipGrid");
    const contactToggle = document.getElementById("contactToggle");
    const contactSection = document.getElementById("contactSection");
    const contactInput = document.getElementById("contact");
    const submitBtn = document.getElementById("submitBtn");
    const form = document.getElementById("feedbackForm");
    const formMessage = document.getElementById("formMessage");
    const commentInput = document.getElementById("comment");

    let selectedRating = 0;
    let selectedTags = [];

    function renderChips(options) {
      chipGrid.innerHTML = "";
      selectedTags = [];

      options.forEach(option => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chip";
        btn.textContent = option;

        btn.addEventListener("click", () => {
          const alreadySelected = selectedTags.includes(option);
          if (alreadySelected) {
            selectedTags = selectedTags.filter(tag => tag !== option);
            btn.classList.remove("selected");
          } else {
            selectedTags.push(option);
            btn.classList.add("selected");
          }
        });

        chipGrid.appendChild(btn);
      });
    }

    function updateRatingUI(rating) {
      stars.forEach(star => {
        const starRating = Number(star.dataset.rating);
        star.classList.toggle("active", starRating <= rating);
      });

      if (rating <= 2) {
        ratingNote.textContent = "We’re sorry to hear that.";
        issueTitle.textContent = "What went wrong?";
        renderChips(negativeOptions);
      } else if (rating === 3) {
        ratingNote.textContent = "Thanks — help us improve.";
        issueTitle.textContent = "What could be better?";
        renderChips(negativeOptions);
      } else {
        ratingNote.textContent = "Great — thank you for the feedback.";
        issueTitle.textContent = "What did you like?";
        renderChips(positiveOptions);
      }

      issueSection.classList.remove("hidden");
      submitBtn.disabled = false;
      formMessage.innerHTML = "";
    }

    function resetForm() {
      form.reset();
      selectedRating = 0;
      selectedTags = [];
      issueSection.classList.add("hidden");
      contactSection.classList.add("hidden");
      submitBtn.disabled = true;
      ratingNote.textContent = "Tap a rating to continue";
      stars.forEach(star => star.classList.remove("active"));
      chipGrid.innerHTML = "";
    }

    stars.forEach(star => {
      star.addEventListener("click", () => {
        selectedRating = Number(star.dataset.rating);
        updateRatingUI(selectedRating);
      });
    });

    contactToggle.addEventListener("change", () => {
      contactSection.classList.toggle("hidden", !contactToggle.checked);
      if (!contactToggle.checked) contactInput.value = "";
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      formMessage.innerHTML = "";

      if (!selectedRating) {
        formMessage.innerHTML = '<div class="message error">Please select a rating first.</div>';
        return;
      }

      if (contactToggle.checked && !contactInput.value.trim()) {
        formMessage.innerHTML = '<div class="message error">Please enter your phone or email so we can contact you.</div>';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";

      const payload = {
        businessId,
        businessName,
        rating: selectedRating,
        tags: selectedTags,
        comment: commentInput.value.trim(),
        contactRequested: contactToggle.checked,
        contact: contactInput.value.trim(),
        source: "public-feedback-page",
        createdAt: serverTimestamp()
      };

      try {
        await addDoc(collection(db, "feedback"), payload);
        formMessage.innerHTML =
          '<div class="message success">Thank you. Your feedback has been submitted.</div>';
        resetForm();
      } catch (error) {
        console.error("Firestore error:", error);
        formMessage.innerHTML =
          '<div class="message error">Submission failed. Please try again.</div>';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Feedback";
      }
    });
  </script>
</body>
</html>
